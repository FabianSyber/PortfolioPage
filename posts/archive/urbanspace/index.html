<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="post-title">Loading...</title>
    
    <link rel="stylesheet" href="/assets/css/single.css" />
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/navbar.css" />
    <link rel="stylesheet" href="/assets/css/post.css" />
    <link rel="stylesheet" href="/assets/css/home.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;500;600" rel="stylesheet">
  </head>
  <body>
    <div id="navbar"></div>
    <div id="gallery"></div>
    <div class="container mt-5">
      <div class="row">
        <div class="col-12">
          <h1 class="post-title" id="title">
            <div class="loading-spinner"></div>
          </h1>
          <div class="post-content">
            <div id="markdown-content"></div>
          </div>
          <div class="post-meta list-holder">
            <ul class="details">
              <li class="year" id="year"></li>
              <li class="location" id="location"></li>
              <li class="status" id="status"></li>
              <li class="client" id="client"></li>
              <li class="categories" id="categories"></li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/assets/js/includes.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/carousel.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const script = document.createElement('script');
        script.src = '/assets/js/post.js';
        document.body.appendChild(script);
      });
    </script>
  </body>
</html>
